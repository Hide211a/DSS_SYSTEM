# StockWise — production-like stack (PostgreSQL)
# Локальна розробка: npm run dev + SQLite (див. README)
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: stockwise
      POSTGRES_PASSWORD: stockwise
      POSTGRES_DB: stockwise
    ports:
      - '5432:5432'
    volumes:
      - stockwise_pg:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U stockwise -d stockwise']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://stockwise:stockwise@db:5432/stockwise
      ADMIN_USER: admin
      ADMIN_PASSWORD: admin123
      JWT_SECRET: change-me-in-production
      CORS_ORIGIN: http://localhost:8080
    ports:
      - '3001:3001'

  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - '8080:80'

volumes:
  stockwise_pg:
